{% extends 'client/LAYOUT.html' %}
{% load static %}
{% block PageData %}

    <div class="container py-5">
        <div class="row">
            <div class="col-lg-12">
                <div class="shadow-sm bg-white rounded overflow-hidden border">
                    <div class="p-0">

                        <div class="p-4">

                            <div class="row row-cols-1 row-cols-md-1 g-4">
                                <div class="col">
                                    <div class="border rounded p-4">
                                        <div class="mb-4">
                                <h5 class="mb-0 fw-bold"><i class="ri-store-2-line me-2 align-middle"></i>
                                    Review {{ reviewStore.store_name }}</h5>
                            </div>
                                        <form class="mt-4" method="post" id="StoreChangePasswordForm" action="/ReviewStore">
                                            {% csrf_token %}
                                            <input type="hidden" value="{{ reviewStore.id }}" name="Store_id" id="Store_id" readonly>
                                            <div class="mb-4">
                                                <label for="review_score"
                                                       class="form-label"><i
                                                        class="ri-star-line align-bottom me-1"></i>Rate your experience
                                                </label>
                                                <select name="review_score" id="review_score" class="form-control">
                                                    <option value="1">1</option>
                                                    <option value="2">2</option>
                                                    <option value="3">3</option>
                                                    <option value="4">4</option>
                                                    <option value="5">5</option>
                                                </select>
                                            </div>


                                            <div class="mb-4">
                                                <label for="review_title"
                                                       class="form-label"><i
                                                        class="bi bi-pen align-bottom me-1"></i>Your Experience
                                                </label>
                                                <input type="text" class="form-control"
                                                       id="review_title" name="review_title"
                                                       aria-describedby="emailHelp"
                                                       placeholder="Say something about your experience">
                                            </div>

                                            <div class="mb-4">
                                                <label for="review_description"
                                                       class="form-label"><i
                                                        class="bi bi-info-circle align-bottom me-1"></i>Tell us in detail
                                                </label>
                                                <textarea name="review_description" class="form-control" id="review_description" rows="4"></textarea>
                                            </div>


                                            <div class="row">
                                                <div class="col-md-6">
                                                    <div class="d-grid">
                                                        <a class="btn btn-outline-success btn-lg py-3 px-4"
                                                                href="/ClientDashboard">
                                                            <div class="d-flex justify-content-between">
                                                                <div>Cancel</div>
                                                                <div class="fw-bold"><i
                                                                        class="bi bi-x-lg align-middle ri-xl"></i>
                                                                </div>
                                                            </div>
                                                        </a>
                                                    </div>
                                                </div>
                                                <div class="col-md-6">
                                                    <div class="d-grid">
                                                        <button type="submit"
                                                                class="btn btn-success btn-lg py-3 px-4">
                                                            <div class="d-flex justify-content-between">
                                                                <div>Submit</div>
                                                                <div class="fw-bold"><i
                                                                        class="ri-login-circle-line align-middle ri-xl"></i>
                                                                </div>
                                                            </div>
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>


{% endblock %}
